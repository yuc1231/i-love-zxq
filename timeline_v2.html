  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: linear-gradient(135deg, #ffe4e1 0%, #ffc0cb 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      color: #333;
    }

    h1 {
      text-align: center;
      padding: 40px 10px 10px;
      font-size: 2.5em;
      color: #d63384;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
      margin: 0;
    }

    .intro {
      text-align: center;
      color: #c2185b;
      margin-bottom: 40px;
      font-size: 1.1em;
      padding: 0 20px;
    }

    /* 时间轴主容器 */
    .timeline {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 贯穿中间的垂直线 */
    .timeline::after {
      content: '';
      position: absolute;
      width: 4px;
      background-color: #f06292;
      top: 0;
      bottom: 0;
      left: 50%;
      margin-left: -2px;
      border-radius: 2px;
    }

    /* 单个时间节点容器 */
    .timeline-item {
      padding: 10px 40px;
      position: relative;
      background-color: inherit;
      width: 50%;
      margin-bottom: 30px;
    }

    /* 左侧和右侧的区分 */
    .timeline-item.left {
      left: 0;
    }
    .timeline-item.right {
      left: 50%;
    }

    /* 时间轴上的圆点 */
    .timeline-item::after {
      content: '❤️';
      position: absolute;
      width: 32px;
      height: 32px;
      right: -16px;
      background-color: white;
      border: 3px solid #f06292;
      top: 20px;
      border-radius: 50%;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(240, 98, 146, 0.4);
    }
    .timeline-item.right::after {
      left: -16px;
    }

    /* 故事内容卡片 */
    .timeline-content {
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.85);
      position: relative;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .timeline-content:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .timeline-date {
      color: #d63384;
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 10px;
      display: inline-block;
      background: #fce4ec;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .timeline-title {
      margin: 0 0 10px 0;
      font-size: 1.4em;
      color: #c2185b;
    }

    .timeline-text {
      line-height: 1.6;
      margin-bottom: 15px;
      color: #555;
    }

    /* 卡片内的照片容器（支持多图网格） */
    .timeline-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    /* 如果只有单张图片，允许大图显示 */
    .timeline-images.single-image {
      display: block;
    }
    .timeline-images.single-image .timeline-img {
      max-height: 300px;
      height: auto;
    }

    /* 卡片内的单张/多张照片 */
    .timeline-img {
      width: 100%;
      height: 140px; /* 多图时的默认固定高度，保证网格整齐 */
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      margin-bottom: 5px;
    }

    .timeline-img:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    /* 底部按钮区 */
    .footer-message {
      text-align: center;
      margin: 50px 20px;
      padding-bottom: 50px;
    }

    .reveal-button {
      padding: 12px 30px;
      font-size: 18px;
      background-color: #f06292;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(240, 98, 146, 0.4);
      transition: all 0.3s ease;
    }

    .reveal-button:hover {
      background-color: #e91e63;
      transform: scale(1.05);
    }

    #loveMessage {
      display: none;
      font-size: 1.8em;
      color: #c2185b;
      margin-top: 20px;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 照片放大模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 90vh;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 3px solid #fff;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: #f1f1f1;
      font-size: 40px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      z-index: 1001;
    }

    .close:hover {
      color: #ff4081;
    }

    /* 响应式设计：移动端适配 */
    @media screen and (max-width: 768px) {
      .timeline::after {
        left: 31px;
      }
      .timeline-item {
        width: 100%;
        padding-left: 70px;
        padding-right: 25px;
      }
      .timeline-item.right {
        left: 0;
      }
      .timeline-item.left::after, .timeline-item.right::after {
        left: 15px;
      }
    }
  </style>
</head>

    const timelineContainer = document.getElementById('timeline-container');

    // 动态渲染时间轴功能
    function renderTimeline() {
      storyData.forEach((item, index) => {
        // PC端左右交替显示（偶数左，奇数右）
        const sideClass = index % 2 === 0 ? 'left' : 'right';
        
        const timelineItem = document.createElement('div');
        timelineItem.className = `timeline-item ${sideClass}`;
        
        // 构建卡片内部HTML
        let contentHTML = `
          <div class="timeline-content">
            <div class="timeline-date">${item.date}</div>
            <h3 class="timeline-title">${item.title}</h3>
            <p class="timeline-text">${item.text}</p>
        `;
        
        // 兼容单张图片(image)和多张图片(images数组)
        let itemImages = [];
        if (item.images && Array.isArray(item.images)) {
          itemImages = item.images;
        } else if (item.image) {
          itemImages = [item.image];
        }
        
        // 如果有图片，则渲染图片容器
        if (itemImages.length > 0) {
          const isSingle = itemImages.length === 1;
          contentHTML += `<div class="timeline-images ${isSingle ? 'single-image' : ''}">`;
          itemImages.forEach(imgSrc => {
            contentHTML += `<img src="${imgSrc}" class="timeline-img" alt="${item.title}" onclick="openModal(this.src)">`;
          });
          contentHTML += `</div>`;
        }
        
        contentHTML += `</div>`;
        timelineItem.innerHTML = contentHTML;
        timelineContainer.appendChild(timelineItem);
      });
    }

    // 页面加载完成后执行渲染
    window.onload = function() {
      renderTimeline();
    };

    // 底部情话显示逻辑
    function revealLove() {
      document.getElementById("loveMessage").style.display = "block";
      document.getElementById("revealBtn").style.display = "none";
    }

    // ==========================================
    // 图片模态框功能逻辑（点击图片放大）
    // ==========================================
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.getElementsByClassName("close")[0];

    // 打开模态框
    function openModal(imgSrc) {
      modal.style.display = "block";
      modalImg.src = imgSrc;
      // 弹出时禁止背景滚动
      document.body.style.overflow = "hidden";
    }

    // 点击右上角X关闭
    closeBtn.onclick = function() {
      modal.style.display = "none";
      document.body.style.overflow = "auto";
    }

    // 点击黑色背景处关闭
    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
      }
    }
  </script>
